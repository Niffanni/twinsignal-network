<!DOCTYPE html>
<html>
<head>
<title>TwinSignal Network</title>

<style>
body{
background:black;
color:#00ff9c;
font-family:monospace;
padding:20px;
}

#output{
height:80vh;
overflow:auto;
white-space:pre-wrap;
}

input{
width:100%;
background:black;
border:none;
color:#00ff9c;
font-family:monospace;
font-size:16px;
}
</style>

</head>

<body>

<h2>TwinSignal Network Terminal</h2>

<div id="output"></div>

<input id="cmd" placeholder="type help">

<script>

const output=document.getElementById("output")
const cmd=document.getElementById("cmd")

function print(t){
output.innerHTML+=t+"\\n"
output.scrollTop=output.scrollHeight
}

function runCommand(c){

switch(c){

case "help":
print("commands:")
print("whoami")
print("join network")
print("scan")
print("summon rabbit")
break

case "whoami":
print("VISITOR NODE "+Math.floor(Math.random()*9000))
break

case "join network":
print("NODE REGISTERED")
print("WELCOME TO TWIN SIGNAL")
break

case "scan":
print("SCANNING NETWORK")
break

case "summon rabbit":
print("(\\_/)")
print("( •_•)")
print("/ >📡")
break

default:
print("signal received")

}

}

cmd.addEventListener("keydown",function(e){

if(e.key==="Enter"){
let command=this.value.toLowerCase()
print("> "+command)
runCommand(command)
this.value=""
}

})

</script>

</body>
</html>
